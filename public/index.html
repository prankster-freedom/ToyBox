<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToyBox App</title>
    <style>
        body { font-family: sans-serif; padding: 1em; }
        #app { max-width: 800px; margin: 0 auto; }
        .posts-list { list-style: none; padding: 0; }
        .post-item { border: 1px solid #ccc; border-radius: 5px; padding: 1em; margin-bottom: 1em; }
        .post-item h3 { margin-top: 0; }
        .post-item button { background: #f44336; color: white; border: none; padding: 0.5em 1em; border-radius: 3px; cursor: pointer; }
        .new-post-form { margin-bottom: 2em; }
        .new-post-form input, .new-post-form textarea { display: block; width: 100%; margin-bottom: 0.5em; padding: 0.5em; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="script.js"></script>
</body>
</html>
